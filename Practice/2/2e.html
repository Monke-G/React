<!DOCTYPE html>
<html>
  <head>
    <title>React Practice</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script type="text/babel">

        function ProductDetails({ imageSrc, type, price, discountPrice }) {
            return(
                <>
                    <br/>
                    <br/>
                    <img src={imageSrc}/>
                    <p>{type}</p>
                    {discountPrice ? (
                        <>
                            <del><p>Price: ${price}</p></del>
                            <p>Discount price: ${discountPrice}</p>
                        </>
                    ) : (
                        <p>Price: ${price}</p>
                    )}
                    <button>Add to Cart</button>
                </>
            )
        }

        function App() {
            return(
                <>
                    <ProductDetails
                    imageSrc="../../Assets/cotton-socks.png" 
                    type="Cotton socks" 
                    price="10.90" 
                    discountPrice="5.45"
                    />
                    <ProductDetails 
                    imageSrc="../../Assets/tennis-balls.png" 
                    type="Tennis balls" 
                    price="6.00"
                    />
                    <ProductDetails 
                    imageSrc="../../Assets/plain-t-shirt.png" 
                    type="Plain T-Shirt" 
                    price="7.99"
                    />
                </>
            )
        }

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App/>);
      
    </script>

  </body>
</html>
